<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 혜원이의 영어 놀이터 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Fredoka:wght@400;500;600;700&family=Single+Day&display=swap" rel="stylesheet">

<!-- 🐱 카톡/페이스북/트위터 미리보기 (Open Graph) -->
<meta property="og:title" content="🐱 혜원이의 영어 놀이터 🌸">
<meta property="og:description" content="매일매일 20개 단어와 신나는 퀴즈로 영어 실력 쑥쑥! 🎀">

<meta name="twitter:title" content="🐱 혜원이의 영어 놀이터 🌸">
<meta name="twitter:description" content="매일 20개 단어 + 퀴즈! 🎀">
<meta name="theme-color" content="#ff8fb5">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🐱%3C/text%3E%3C/svg%3E">

<style>
  :root {
    --pink: #ffc0d4;
    --pink-deep: #ff8fb5;
    --pink-light: #ffe4ed;
    --lavender: #d4baff;
    --lavender-light: #ede0ff;
    --mint: #b5ead7;
    --mint-light: #dff7ec;
    --peach: #ffd4b5;
    --peach-light: #ffebd8;
    --yellow: #fff3bf;
    --cream: #fff8f3;
    --text: #5d4c6d;
    --text-soft: #9a8bad;
    --shadow: 0 4px 0 rgba(150, 110, 140, 0.15);
    --shadow-lg: 0 8px 0 rgba(150, 110, 140, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jua', 'Gaegu', 'Fredoka', sans-serif;
    background: linear-gradient(180deg, #ffe4ed 0%, #ede0ff 50%, #dff7ec 100%);
    background-attachment: fixed;
    min-height: 100vh;
    transition: background 1s ease;
  }

  /* ===== 🌸 봄 테마 (3~5월) - 기본 ===== */
  body.season-spring {
    background: linear-gradient(180deg, #ffe4ed 0%, #ede0ff 50%, #dff7ec 100%);
  }

  /* ===== ☀️ 여름 테마 (6~8월) ===== */
  body.season-summer {
    background: linear-gradient(180deg, #fff9c4 0%, #b3e5fc 45%, #80deea 100%);
  }
  body.season-summer .logo-box { border-color: #00acc1; }
  body.season-summer .date-chip { border-color: #fbc02d; }
  body.season-summer .greeting-card { border-color: #4fc3f7; }
  body.season-summer .greeting-text h1 span { color: #00838f; }
  body.season-summer .speech-bubble {
    background: #fff59d;
    border-color: #f9a825;
  }

  /* ===== 🍂 가을 테마 (9~11월) ===== */
  body.season-autumn {
    background: linear-gradient(180deg, #fff3e0 0%, #ffcc80 45%, #d7a577 100%);
  }
  body.season-autumn .logo-box { border-color: #e65100; }
  body.season-autumn .date-chip { border-color: #bf360c; }
  body.season-autumn .greeting-card { border-color: #ff8a65; }
  body.season-autumn .greeting-text h1 span { color: #bf360c; }
  body.season-autumn .speech-bubble {
    background: #fff3e0;
    border-color: #ff8a65;
  }

  /* ===== ❄️ 겨울 테마 (12~2월) ===== */
  body.season-winter {
    background: linear-gradient(180deg, #e1f5fe 0%, #cfd8dc 45%, #d1c4e9 100%);
  }
  body.season-winter .logo-box { border-color: #5e35b1; }
  body.season-winter .date-chip { border-color: #0277bd; }
  body.season-winter .greeting-card { border-color: #90caf9; }
  body.season-winter .greeting-text h1 span { color: #5e35b1; }
  body.season-winter .speech-bubble {
    background: #ede7f6;
    border-color: #b39ddb;
  }
  body.season-winter .bg-decor {
    animation: snowfall 6s linear infinite;
  }
  @keyframes snowfall {
    0% { transform: translateY(-20px); opacity: 0.5; }
    50% { transform: translateY(50vh) rotate(180deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0.3; }
    color: var(--text);
    padding: 20px 16px 60px;
    overflow-x: hidden;
    position: relative;
  }

  /* 배경 별/하트 장식 */
  .bg-decor {
    position: fixed;
    pointer-events: none;
    opacity: 0.5;
    z-index: 0;
    font-size: 24px;
    animation: float 4s ease-in-out infinite;
  }
  .bg-decor.s1 { top: 5%; left: 5%; animation-delay: 0s; }
  .bg-decor.s2 { top: 15%; right: 8%; animation-delay: 0.7s; }
  .bg-decor.s3 { top: 40%; left: 3%; animation-delay: 1.4s; }
  .bg-decor.s4 { top: 60%; right: 5%; animation-delay: 2.1s; }
  .bg-decor.s5 { bottom: 15%; left: 8%; animation-delay: 0.3s; }
  .bg-decor.s6 { bottom: 30%; right: 10%; animation-delay: 1.8s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-15px) rotate(10deg); }
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ===== 헤더 ===== */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .logo-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    padding: 8px 14px 8px 8px;
    border-radius: 50px;
    box-shadow: var(--shadow);
    border: 2px solid var(--pink-deep);
  }
  .logo-box .cat-avatar {
    width: 34px;
    height: 34px;
    background: var(--peach);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .logo-box span {
    font-family: 'Jua', sans-serif;
    font-size: 0.95em;
    color: var(--text);
  }
  .date-chip {
    background: white;
    padding: 8px 14px;
    border-radius: 50px;
    font-family: 'Gaegu', sans-serif;
    font-size: 0.9em;
    font-weight: 700;
    color: var(--text);
    box-shadow: var(--shadow);
    border: 2px solid var(--lavender);
  }

  /* ===== 인사 섹션 ===== */
  .greeting-card {
    background: white;
    border: 3px solid var(--pink);
    border-radius: 28px;
    padding: 24px 20px 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-lg);
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .greeting-cat {
    width: 90px;
    height: 90px;
    flex-shrink: 0;
    animation: wobble 3s ease-in-out infinite;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  .greeting-text {
    flex: 1;
  }
  .greeting-text h1 {
    font-family: 'Jua', sans-serif;
    font-size: 1.5em;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .greeting-text h1 span {
    color: var(--pink-deep);
  }
  .greeting-text p {
    font-family: 'Gaegu', sans-serif;
    font-size: 1em;
    color: var(--text-soft);
  }
  .speech-bubble {
    position: absolute;
    top: -18px;
    right: 20px;
    background: var(--yellow);
    border: 2px solid var(--peach);
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Gaegu', sans-serif;
    font-size: 0.85em;
    font-weight: 700;
    box-shadow: 0 2px 0 rgba(150,110,140,0.1);
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* ===== 통계 카드 ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: white;
    border-radius: 22px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 2.5px solid transparent;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-card.pink { border-color: var(--pink); background: var(--pink-light); }
  .stat-card.mint { border-color: var(--mint); background: var(--mint-light); }
  .stat-card.peach { border-color: var(--peach); background: var(--peach-light); }
  .stat-cat {
    width: 48px;
    height: 48px;
    margin: 0 auto 6px;
  }
  .stat-value {
    font-family: 'Jua', sans-serif;
    font-size: 1.5em;
    line-height: 1;
    color: var(--text);
  }
  .stat-value .unit {
    font-family: 'Gaegu', sans-serif;
    font-size: 0.55em;
    margin-left: 2px;
  }
  .stat-label {
    font-family: 'Gaegu', sans-serif;
    font-weight: 700;
    font-size: 0.85em;
    color: var(--text-soft);
    margin-top: 4px;
  }

  /* ===== 🔥 연속 학습 스트릭 카드 ===== */
  .streak-card {
    background: linear-gradient(135deg, #ff6b6b 0%, #ffa502 50%, #ffd93d 100%);
    border-radius: 28px;
    padding: 22px 22px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 12px 28px rgba(255, 107, 107, 0.3);
    color: white;
    position: relative;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.4);
  }
  .streak-card::before {
    content: "✨";
    position: absolute;
    top: 12px; right: 18px;
    font-size: 1.3em;
    opacity: 0.6;
    animation: twinkle 2s ease-in-out infinite;
  }
  .streak-card::after {
    content: "⭐";
    position: absolute;
    bottom: 14px; left: 16px;
    font-size: 1em;
    opacity: 0.5;
    animation: twinkle 2.5s ease-in-out infinite reverse;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  .streak-flame {
    font-size: 4em;
    line-height: 1;
    flex-shrink: 0;
    filter: drop-shadow(0 0 16px rgba(255, 200, 0, 0.6));
    animation: flicker 1.2s ease-in-out infinite;
  }
  @keyframes flicker {
    0%, 100% { transform: scale(1) rotate(-2deg); }
    25% { transform: scale(1.1) rotate(3deg); }
    50% { transform: scale(1.05) rotate(-1deg); }
    75% { transform: scale(1.15) rotate(2deg); }
  }
  .streak-info { flex: 1; min-width: 0; }
  .streak-num {
    font-family: 'Jua', sans-serif;
    font-size: 2.6em;
    line-height: 1;
    text-shadow: 2px 3px 0 rgba(193, 66, 0, 0.4);
  }
  .streak-num small {
    font-size: 0.42em;
    margin-left: 4px;
    font-family: 'Gaegu', sans-serif;
    font-weight: 700;
  }
  .streak-label {
    font-family: 'Jua', sans-serif;
    font-size: 1.05em;
    margin-top: 4px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
  }
  .streak-message {
    font-family: 'Gaegu', sans-serif;
    font-size: 0.9em;
    margin-top: 4px;
    opacity: 0.95;
  }
  .streak-card.zero {
    background: linear-gradient(135deg, #cfd8dc 0%, #b0bec5 100%);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }
  .streak-card.zero .streak-flame {
    filter: grayscale(0.8);
    opacity: 0.7;
  }

  /* ===== 🐱 고양이 친구 컬렉션 ===== */
  .cats-collection {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .cat-friend {
    background: white;
    border-radius: 18px;
    padding: 10px 6px 8px;
    text-align: center;
    border: 2.5px solid var(--lavender-light);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    cursor: default;
  }
  .cat-friend.unlocked {
    border-color: var(--pink);
    background: linear-gradient(135deg, white, var(--pink-light));
    box-shadow: 0 4px 10px rgba(255, 143, 181, 0.18);
  }
  .cat-friend.unlocked:hover {
    transform: translateY(-4px) rotate(-3deg);
    box-shadow: 0 8px 16px rgba(255, 143, 181, 0.3);
  }
  .cat-friend.unlocked.just-unlocked {
    animation: catBounce 0.6s ease-in-out;
    border-color: #ffd93d;
  }
  @keyframes catBounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2) rotate(8deg); }
  }
  .cat-friend.locked {
    opacity: 0.55;
    filter: grayscale(0.85);
  }
  .cat-friend.locked::after {
    content: "🔒";
    position: absolute;
    top: 4px; right: 4px;
    font-size: 0.85em;
  }
  .cat-svg {
    width: 52px;
    height: 52px;
    margin: 0 auto 2px;
  }
  .cat-name {
    font-family: 'Jua', sans-serif;
    font-size: 0.78em;
    line-height: 1.2;
    color: var(--text);
  }
  .cat-status {
    font-family: 'Gaegu', sans-serif;
    font-size: 0.7em;
    color: var(--text-soft);
    margin-top: 2px;
  }
  .cat-friend.unlocked .cat-status { color: var(--pink-deep); font-weight: 700; }

  @media (max-width: 420px) {
    .cats-collection { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .cat-svg { width: 44px; height: 44px; }
    .cat-name { font-size: 0.7em; }
    .cat-status { font-size: 0.65em; }
  }

  /* ===== 오늘 카드 ===== */
  .today-big {
    background: linear-gradient(135deg, #ffd4e5 0%, #e0ccff 50%, #c8f5e7 100%);
    border: 3px solid white;
    border-radius: 32px;
    padding: 24px 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .today-big .today-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .today-big .today-title .badge {
    background: white;
    padding: 3px 12px;
    border-radius: 20px;
    font-family: 'Jua', sans-serif;
    font-size: 0.75em;
    color: var(--pink-deep);
    border: 2px solid var(--pink-deep);
    animation: wobble 2s ease-in-out infinite;
  }
  .today-big h2 {
    font-family: 'Jua', sans-serif;
    font-size: 1.7em;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .today-big .today-sub {
    font-family: 'Gaegu', sans-serif;
    color: var(--text-soft);
    margin-bottom: 18px;
  }
  .today-links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 420px) {
    .today-links { grid-template-columns: 1fr; }
  }
  .today-link {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    background: white;
    padding: 14px 14px;
    border-radius: 20px;
    text-decoration: none;
    color: var(--text);
    box-shadow: var(--shadow);
    transition: transform 0.15s;
    border: 2px solid transparent;
    position: relative;
  }
  .today-link:hover { transform: translateY(-3px) rotate(-1deg); border-color: var(--pink-deep); }
  .today-link .link-cat {
    width: 38px;
    height: 38px;
    margin-bottom: 6px;
  }
  .today-link .link-title {
    font-family: 'Jua', sans-serif;
    font-size: 1em;
    margin-bottom: 2px;
  }
  .today-link .link-desc {
    font-family: 'Gaegu', sans-serif;
    font-size: 0.85em;
    color: var(--text-soft);
  }
  .today-no-class {
    background: white;
    padding: 16px;
    border-radius: 20px;
    font-family: 'Gaegu', sans-serif;
    text-align: center;
    font-size: 1.05em;
  }

  /* ===== 섹션 헤더 ===== */
  .sec-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0 8px 12px;
  }
  .sec-head h3 {
    font-family: 'Jua', sans-serif;
    font-size: 1.15em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sec-head .hint {
    font-family: 'Gaegu', sans-serif;
    font-size: 0.85em;
    color: var(--text-soft);
  }

  /* ===== 달력 ===== */
  .cal-card {
    background: white;
    border-radius: 26px;
    padding: 20px 18px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    border: 2.5px solid var(--lavender-light);
  }
  .cal-month {
    font-family: 'Jua', sans-serif;
    font-size: 1.15em;
    text-align: center;
    margin-bottom: 14px;
    color: var(--text);
  }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }
  .cal-weekdays div {
    text-align: center;
    font-family: 'Gaegu', sans-serif;
    font-size: 0.8em;
    font-weight: 700;
    color: var(--text-soft);
    padding: 4px 0;
  }
  .cal-weekdays div.sun { color: var(--pink-deep); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Gaegu', sans-serif;
    font-size: 0.9em;
    font-weight: 700;
    color: var(--text-soft);
    border-radius: 14px;
    position: relative;
    background: var(--cream);
  }
  .cal-day.empty { visibility: hidden; }
  .cal-day.learned {
    background: var(--mint);
    color: var(--text);
  }
  .cal-day.upcoming {
    background: var(--yellow);
    color: #92400e;
    border: 1.5px dashed #f59e0b;
  }
  /* 학습 자료 있는 날짜는 클릭 가능 */
  a.cal-day {
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    overflow: hidden;
  }
  a.cal-day:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 4px 12px rgba(150,110,140,0.2);
    z-index: 5;
  }
  .cal-day .cal-num {
    font-size: 0.85em;
    line-height: 1;
  }
  .cal-day .cal-icon {
    font-size: 1em;
    line-height: 1;
    margin-top: 2px;
  }
  .cal-day.today .cal-icon { font-size: 0.9em; }
  .cal-day.exam {
    background: linear-gradient(135deg, #fff3bf, #ffe082);
    border: 2px solid #ffc107;
    color: #5d4c6d;
    font-weight: 700;
  }
  .cal-day.review {
    background: linear-gradient(135deg, #e0f2f1, #c5e1a5);
    border: 1.5px solid #81c784;
    color: #2e7d32;
    font-weight: 700;
  }
  .cal-day.today {
    background: linear-gradient(135deg, var(--pink-deep), var(--lavender));
    color: white;
    transform: scale(1.08);
    box-shadow: 0 3px 0 rgba(255,143,181,0.4);
    z-index: 2;
  }

  /* ===== 지난 학습 메인 버튼 ===== */
  .archive-btn-main {
    width: 100%;
    background: white;
    border: 2.5px solid var(--lavender);
    border-radius: 22px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-family: 'Jua', sans-serif;
    color: var(--text);
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    margin-top: 8px;
  }
  .archive-btn-main:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--pink-deep);
  }
  .archive-btn-main:active { transform: translateY(-1px); }
  .archive-btn-icon {
    font-size: 1.8em;
    flex-shrink: 0;
  }
  .archive-btn-text { flex: 1; text-align: left; }
  .archive-btn-title {
    font-size: 1.05em;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .archive-btn-sub {
    font-family: 'Gaegu', sans-serif;
    font-size: 0.9em;
    color: var(--text-soft);
  }
  .archive-btn-arrow {

const todayStr = `${yyyy}-${mm}-${dd}`;

// ========== 🔥 연속 학습 스트릭 ==========
function calculateStreak() {
  try {
    const history = JSON.parse(localStorage.getItem('hyewon_vocab_history') || '[]');
    if (history.length === 0) return 0;

    // 학습 날짜만 추출 (중복 제거 + 정렬)
    const dates = [...new Set(history.map(r => r.date))].sort();
    if (dates.length === 0) return 0;

    // 오늘 / 어제 날짜
    const t = new Date();
    const todayD = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const y = new Date(t); y.setDate(t.getDate()-1);
    const yestD = `${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;

    // 가장 최근 학습일이 오늘 또는 어제가 아니면 streak 끊김
    const last = dates[dates.length - 1];
    if (last !== todayD && last !== yestD) return 0;

    // 역순으로 연속 일수 카운트
    let streak = 1;
    for (let i = dates.length - 1; i > 0; i--) {
      const cd = new Date(dates[i]);
      const pd = new Date(dates[i-1]);
      const diff = Math.round((cd - pd) / 86400000);
      if (diff === 1) streak++;
      else break;
    }
    return streak;
  } catch(e) {
    return 0;
  }
}

const streak = calculateStreak();
document.getElementById('streakCount').textContent = streak;

// 스트릭 메시지 + 라벨

  streakMessage.textContent = `일주일까지 ${7-streak}일 남았어요! 💪`;
} else if (streak === 7) {
  streakLabel.textContent = '🏆 일주일 달성!';
  streakMessage.textContent = '진짜 멋진 혜원이! 🌟';

  streakLabel.textContent = `${streak}일 연속!`;

} else if (streak < 100) {

// ========== 통계 (정확한 계산) ==========
// 규칙:
//   1) 종합시험·복습은 '복습'이라 새 단어 학습이 아님 → 제외
//   2) 오늘은 아직 학습 시작 전일 수 있음 → 어제까지만 카운트
//   3) 결과: 평일 단어장 (월~금) × 20단어
const WORDS_PER_DAY = 20;
const pastItems = SCHEDULE.filter(s => {
  // 종합시험·복습 제외 (이미 배운 단어 다시 보는 것이라 누적 X)
  if (s.theme && (s.theme.indexOf('종합시험') !== -1 || s.theme.indexOf('복습') !== -1)) {
    return false;
  }
  // 오늘 미만 (어제까지) — 오늘은 아직 안 했을 수 있음
  return s.date < todayStr;
});
document.getElementById('statWords').innerHTML = `${pastItems.length * WORDS_PER_DAY}<span class="unit">개</span>`;
document.getElementById('statDays').innerHTML = `${pastItems.length}<span class="unit">일</span>`;

// ========== 🐱 고양이 친구들 컬렉션 ==========
const CAT_FRIENDS = [
  { unlock:   0, name: '핑키',     color: '#ffc0d4', emoji: '🌸', desc: '첫 친구!' },
  { unlock:  20, name: '버터',     color: '#ffd4b5', emoji: '🍯', desc: '20단어!' },
  { unlock:  50, name: '민트',     color: '#b5ead7', emoji: '🌿', desc: '50단어!' },
  { unlock: 100, name: '라벤더',   color: '#d4baff', emoji: '💜', desc: '100단어!' },
  { unlock: 200, name: '레모니',   color: '#fff3bf', emoji: '🍋', desc: '200단어!' },
  { unlock: 300, name: '클라우드', color: '#cfd8dc', emoji: '☁️', desc: '300단어!' },
  { unlock: 500, name: '레인보우', color: '#ff8fb5', emoji: '🌈', desc: '500단어!' },
  { unlock: 1000,name: '골디',     color: '#ffd700', emoji: '👑', desc: '1000!' }
];

function makeCatSVG(color, locked) {
  const fill = locked ? '#bbb' : color;
  const innerFill = locked ? '#999' : color;
  return `<svg viewBox="0 0 60 60" class="cat-svg">
    <ellipse cx="30" cy="42" rx="18" ry="14" fill="${fill}"/>
    <circle cx="30" cy="25" r="14" fill="${fill}"/>
    <path d="M 20 18 L 17 8 L 26 15 Z" fill="${fill}"/>
    <path d="M 40 18 L 43 8 L 34 15 Z" fill="${fill}"/>
    <circle cx="23" cy="29" r="2.5" fill="#4a3a5a"/>
    <circle cx="37" cy="29" r="2.5" fill="#4a3a5a"/>
    <circle cx="20" cy="33" r="2.5" fill="${locked ? '#888' : '#ff8fa3'}" opacity="${locked ? '0.3' : '0.5'}"/>
    <circle cx="40" cy="33" r="2.5" fill="${locked ? '#888' : '#ff8fa3'}" opacity="${locked ? '0.3' : '0.5'}"/>
    <path d="M 28 34 Q 30 36 32 34" stroke="#4a3a5a" stroke-width="1.2" fill="none"/>
  </svg>`;
}

const wordsLearned = pastItems.length * WORDS_PER_DAY;
const catsContainer = document.getElementById('catsCollection');
let unlockedCount = 0;

CAT_FRIENDS.forEach(cat => {
  const isUnlocked = wordsLearned >= cat.unlock;
  if (isUnlocked) unlockedCount++;
  const remaining = cat.unlock - wordsLearned;
  const status = isUnlocked
    ? `${cat.desc} ${cat.emoji}`
    : `${remaining}개 더!`;

  catsContainer.innerHTML += `
    <div class="cat-friend ${isUnlocked ? 'unlocked' : 'locked'}" title="${cat.name}">
      ${makeCatSVG(cat.color, !isUnlocked)}
      <div class="cat-name">${isUnlocked ? cat.name : '???'}</div>
      <div class="cat-status">${status}</div>
    </div>
  `;
});

document.getElementById('catCount').textContent = `${unlockedCount}/${CAT_FRIENDS.length} 마리`;

const upcoming = SCHEDULE.filter(s => s.date > todayStr).sort((a,b) => a.date.localeCompare(b.date))[0];
const nextEl = document.getElementById('statNext');
if (upcoming) {
  const diffDays = Math.ceil((new Date(upcoming.date) - today) / (1000*60*60*24));
  if (diffDays === 0) nextEl.innerHTML = `오늘<span class="unit"></span>`;
  else if (diffDays === 1) nextEl.innerHTML = `내일<span class="unit"></span>`;
  else nextEl.innerHTML = `${diffDays}<span class="unit">일 뒤</span>`;
} else {
  nextEl.innerHTML = `준비중<span class="unit"></span>`;
}

const todayTitle = document.getElementById('todayTitle');
const todaySub = document.getElementById('todaySub');
const todayContent = document.getElementById('todayContent');

if (todayItem) {
  todayBadge.textContent = `오늘의 수업 ✨`;
  todayTitle.innerHTML = `${todayItem.theme} ${todayItem.emoji}`;
  todaySub.textContent = `새로운 20개 단어가 기다려요!`;
  todayContent.innerHTML = `
    <div class="today-links">
      <a class="today-link" href="${todayItem.folder}/${encodeURIComponent(todayItem.vocab)}">
        <div class="link-cat">${miniCats.sunny}</div>

        <div class="link-desc">단어 20개 배우기</div>

        <div class="link-desc">문제 풀기 도전!</div>
      </a>
    </div>
  `;
} else {
  todayBadge.textContent = `쉬는 날`;
  todayTitle.textContent = `오늘은 쉬어가요 🍵`;
  todaySub.textContent = `아래에서 지난 단어 복습해볼까요?`;
  todayContent.innerHTML = `<div class="today-no-class">😸 내일은 새 단어가 있을지도 몰라요!</div>`;
}

// ========== 달력 ==========
const calMonth = today.getMonth();
const calYear = today.getFullYear();
document.getElementById('calMonth').textContent = `${calYear}년 ${calMonth+1}월`;

const firstDay = new Date(calYear, calMonth, 1).getDay();
const lastDate = new Date(calYear, calMonth+1, 0).getDate();
const calGrid = document.getElementById('calGrid');

for (let i = 0; i < firstDay; i++) {
  calGrid.innerHTML += `<div class="cal-day empty"></div>`;
}
for (let d = 1; d <= lastDate; d++) {
  const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const learned = SCHEDULE.find(s => s.date === ds);
  const isToday = ds === todayStr;
  const isPast = ds < todayStr;
  let cls = 'cal-day';
  let icon = '';

  if (learned) {
    // 학습 종류별 아이콘
    if (learned.theme && learned.theme.indexOf('종합시험') !== -1) {
      icon = '🏆';
    } else if (learned.theme && learned.theme.indexOf('복습') !== -1) {
      icon = '🌻';
    } else {
      icon = '📚'; // 평일 단어장
    }
  }

  if (isToday) cls += ' today';
  else if (learned && isPast) cls += ' learned';
  else if (learned && !isPast) cls += ' upcoming';

  // 종합시험/복습은 별도 스타일 (강조)
  if (learned && learned.theme && learned.theme.indexOf('종합시험') !== -1 && !isToday) {
    cls += ' exam';
  } else if (learned && learned.theme && learned.theme.indexOf('복습') !== -1 && !isToday) {
    cls += ' review';
  }

  if (learned) {
    // 클릭 가능한 a 태그 (해당 날짜 학습 페이지로 이동)
    const targetFile = learned.vocab; // 단어장 우선
    const linkUrl = `${learned.folder}/${encodeURIComponent(targetFile)}`;
    const tip = `${learned.theme} ${learned.emoji}`;
    calGrid.innerHTML += `
      <a href="${linkUrl}" class="${cls}" title="${tip}">
        <span class="cal-num">${d}</span>
        <span class="cal-icon">${icon}</span>
      </a>`;
  } else {
    calGrid.innerHTML += `<div class="${cls}">${d}</div>`;
  }
}

// ========== 지난 학습 ==========
const archiveList = document.getElementById('archiveList');
const pastLearning = SCHEDULE.filter(s => s.date <= todayStr).sort((a,b) => b.date.localeCompare(a.date));

// 메인 버튼 + 모달 요약 텍스트 업데이트
const countText = pastLearning.length === 0
  ? '아직 기록 없음 — 클릭해서 보기'
  : `총 ${pastLearning.length}번 학습 — 클릭해서 모두 보기`;
const summaryText = pastLearning.length === 0
  ? '아직 학습 기록이 없어요'
  : `🎯 지금까지 ${pastLearning.length}일 학습 완료!`;
document.getElementById('archiveBtnCount').textContent = countText;
document.getElementById('modalSummary').textContent = summaryText;

// ========== 모달 열기/닫기 ==========
const archiveModal = document.getElementById('archiveModal');
const openBtn = document.getElementById('openArchiveBtn');
const closeBtn = document.getElementById('closeArchiveBtn');

function openArchive() {
  archiveModal.classList.add('show');
  document.body.style.overflow = 'hidden'; // 배경 스크롤 잠금
}
function closeArchive() {
  archiveModal.classList.remove('show');
  document.body.style.overflow = ''; // 스크롤 복구
}

openBtn.addEventListener('click', openArchive);
closeBtn.addEventListener('click', closeArchive);

// 배경 클릭 시 닫기
archiveModal.addEventListener('click', function(e) {
  if (e.target === archiveModal) closeArchive();
});

// ESC 키로 닫기
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && archiveModal.classList.contains('show')) {
    closeArchive();
  }
});

if (pastLearning.length === 0) {
  archiveList.innerHTML = `<div class="today-no-class" style="background:white; border-radius:22px; box-shadow:var(--shadow);">아직 학습 기록이 없어요 😿</div>`;
} else {
  const catVariants = ['pink', 'mint', 'lavender', 'peach'];
  pastLearning.forEach((item, idx) => {
    const catType = catVariants[idx % catVariants.length];
    archiveList.innerHTML += `
      <div class="arc-item">
        <div class="arc-cat">${miniCats[catType]}</div>
        <div class="arc-info">
          <div class="arc-theme">${item.theme} ${item.emoji}</div>
          <div class="arc-date">${item.date} · ${item.dayKo}요일 · 20단어</div>
        </div>
        <div class="arc-btns">
          <a class="arc-btn vocab" href="${item.folder}/${encodeURIComponent(item.vocab)}" title="단어장">📚</a>
          <a class="arc-btn quiz" href="${item.folder}/${encodeURIComponent(item.quiz)}" title="퀴즈">📝</a>
        </div>
      </div>
    `;
  });
}
</script>
