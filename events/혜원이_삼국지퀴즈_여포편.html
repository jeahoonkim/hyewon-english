<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혜원이의 삼국지 퀴즈 ⚔️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Nanum+Gothic:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0d0000;
    background-image:
      radial-gradient(ellipse at 20% 40%, rgba(180,20,20,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 60%, rgba(150,10,10,0.18) 0%, transparent 55%),
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(180,120,0,0.03) 40px, rgba(180,120,0,0.03) 41px);
  }

  /* 날리는 잎 파티클 */
  .leaf {
    position: fixed; pointer-events: none;
    font-size: 1.2em; opacity: 0;
    animation: leafFall linear infinite;
  }
  @keyframes leafFall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  .scroll {
    width: 760px;
    background: linear-gradient(170deg, #1c0505 0%, #2a0808 40%, #1a0404 100%);
    border-radius: 6px;
    border: 1px solid rgba(201,162,39,0.4);
    box-shadow:
      0 0 0 3px rgba(140,20,20,0.6),
      0 0 0 5px rgba(201,162,39,0.25),
      0 20px 70px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(201,162,39,0.15);
    padding: 40px 46px;
    position: relative;
    overflow: hidden;
    min-height: 560px;
  }

  /* 상단/하단 금색 줄 */
  .scroll::before {
    content: '';
    position: absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, transparent, #c9a227, #ffd700, #c9a227, transparent);
  }
  .scroll::after {
    content: '';
    position: absolute; bottom:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, transparent, #c9a227, #ffd700, #c9a227, transparent);
  }

  /* 배경 한자 */
  .bg-hanja {
    position: absolute; font-size: 18em;
    font-family: 'Noto Serif KR', serif;
    color: rgba(180,30,30,0.05);
    right: -40px; bottom: -60px;
    pointer-events: none; user-select: none;
    line-height: 1;
  }

  .screen { display:none; position:relative; z-index:1; }
  .screen.active { display:block; }

  /* 시작 화면 */
  .start-icon { text-align:center; font-size:3.8em; margin-bottom:12px;
    animation: swordPulse 2s ease-in-out infinite alternate; }
  @keyframes swordPulse {
    from { transform: scale(0.95) rotate(-3deg); }
    to   { transform: scale(1.05) rotate(3deg); }
  }

  .start-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 2.5em; font-weight: 900;
    color: #ffd700;
    text-align: center; margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(255,180,0,0.5), 2px 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 4px;
  }

  .start-sub {
    text-align: center; color: #a07030;
    font-size: 0.9em; margin-bottom: 24px;
    letter-spacing: 2px;
  }

  .start-box {
    background: rgba(201,162,39,0.06);
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 8px;
    padding: 18px 24px; margin-bottom: 28px;
    color: #c8a882; font-size: 0.95em; line-height: 2;
    text-align: center;
  }
  .start-box b { color: #ffd700; }

  .btn {
    display:block; margin:0 auto;
    padding:13px 48px; font-size:1.05em;
    font-weight:700; font-family:'Noto Serif KR',serif;
    border:none; border-radius:4px;
    cursor:pointer; transition:all 0.2s;
    letter-spacing: 2px;
  }

  .btn-start {
    background: linear-gradient(135deg, #8b0000, #cc0000);
    color: #ffd700;
    border: 1px solid rgba(201,162,39,0.5);
    box-shadow: 0 4px 16px rgba(180,0,0,0.5), inset 0 1px 0 rgba(255,200,0,0.2);
  }
  .btn-start:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(180,0,0,0.6); }

  /* 진행 바 */
  .prog-wrap {
    background: rgba(201,162,39,0.1);
    border:1px solid rgba(201,162,39,0.2);
    border-radius:20px; height:8px;
    margin-bottom:6px; overflow:hidden;
  }
  .prog-bar {
    height:100%; border-radius:20px;
    background: linear-gradient(90deg, #8b0000, #ffd700);
    transition:width 0.4s ease;
    box-shadow: 0 0 8px rgba(255,180,0,0.4);
  }
  .prog-label { font-size:0.82em; color:#a07030; text-align:right; margin-bottom:18px; }

  .q-tag {
    display:inline-block;
    background: linear-gradient(135deg, #8b0000, #cc0000);
    border: 1px solid rgba(201,162,39,0.4);
    color:#ffd700; font-size:0.78em;
    padding:3px 14px; border-radius:20px;
    margin-bottom:10px; font-weight:700;
    letter-spacing: 1px;
  }

  .q-num { font-size:0.88em; color:#a07030; font-weight:700; margin-bottom:6px; }

  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.3em; font-weight: 700;
    color: #f5deb3; line-height: 1.65;
    margin-bottom: 24px; min-height: 65px;
  }

  .choices { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .choice-btn {
    padding: 14px 14px;
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    color: #c8a882;
    font-size:0.95em; font-weight:700;
    font-family:'Nanum Gothic',sans-serif;
    cursor:pointer; transition:all 0.18s;
    text-align:left;
  }
  .choice-btn:hover:not(:disabled) {
    background: rgba(180,0,0,0.25);
    border-color: #ffd700; color:#ffd700;
    transform:translateY(-1px);
    box-shadow:0 4px 12px rgba(180,0,0,0.3);
  }
  .choice-btn.correct {
    background: rgba(0,100,40,0.3);
    border-color: #4caf50; color:#81c784;
    box-shadow:0 0 10px rgba(76,175,80,0.2);
  }
  .choice-btn.wrong {
    background: rgba(180,0,0,0.2);
    border-color: #f44336; color:#ef9a9a;
  }

  /* 팝업 */
  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.82); z-index:200;
    align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .overlay.show { display:flex; }

  .popup {
    background: linear-gradient(160deg, #1c0505, #2a0808);
    border: 1px solid rgba(201,162,39,0.5);
    border-radius: 16px;
    padding: 30px 34px;
    max-width: 500px; width:90%;
    text-align:center;
    box-shadow: 0 0 0 2px rgba(180,0,0,0.4), 0 20px 60px rgba(0,0,0,0.7);
    animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    position: relative; overflow: hidden;
  }
  .popup::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
  }
  @keyframes popIn { from{transform:scale(0.75);opacity:0;} to{transform:scale(1);opacity:1;} }

  .popup-photo {
    width:120px; height:120px; border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(201,162,39,0.6);
    margin:6px auto 14px; display:block;
    box-shadow:0 0 20px rgba(201,162,39,0.3);
  }

  .popup-title { font-family:'Noto Serif KR',serif; font-size:1.65em; font-weight:900; margin-bottom:8px; letter-spacing:2px; }
  .popup-title.ok { color:#ffd700; text-shadow:0 0 12px rgba(255,200,0,0.4); }
  .popup-title.ng { color:#ef9a9a; }

  .correct-label { font-size:0.88em; color:#ffd700; font-weight:700; margin-bottom:6px; }

  .explain-box {
    background:rgba(201,162,39,0.06);
    border-left:3px solid #c9a227;
    border-radius:4px;
    padding:10px 14px;
    font-size:0.87em; color:#c8a882;
    text-align:left; line-height:1.8;
    margin:10px 0 16px;
  }

  .btn-next {
    background: linear-gradient(135deg,#8b0000,#cc0000);
    color:#ffd700; padding:12px 38px;
    font-size:1em; border-radius:4px;
    border:1px solid rgba(201,162,39,0.4);
    box-shadow:0 4px 14px rgba(180,0,0,0.4);
    font-family:'Noto Serif KR',serif;
    letter-spacing:1px;
  }
  .btn-next:hover { transform:translateY(-2px); }

  /* 최종 화면 */
  .final-icon { text-align:center; font-size:3.5em; margin:8px 0; }
  .final-title {
    font-family:'Noto Serif KR',serif;
    font-size:2em; font-weight:900;
    color:#ffd700; text-align:center; margin-bottom:12px;
    text-shadow:0 0 16px rgba(255,180,0,0.4);
    letter-spacing:3px;
  }

  .score-box {
    background: linear-gradient(135deg, rgba(139,0,0,0.6), rgba(180,30,0,0.4));
    border:1px solid rgba(201,162,39,0.4);
    border-radius:12px; padding:22px;
    text-align:center; margin:0 0 18px;
    box-shadow:0 0 24px rgba(180,0,0,0.3);
  }
  .score-num {
    font-family:'Noto Serif KR',serif;
    font-size:3.6em; font-weight:900;
    color:#ffd700;
    text-shadow:0 0 16px rgba(255,180,0,0.5);
  }
  .score-sub { color:rgba(201,162,39,0.7); font-size:1em; margin-top:4px; }

  .final-msg {
    font-family:'Noto Serif KR',serif;
    font-size:1.05em; color:#c8a882;
    text-align:center; margin-bottom:18px; line-height:1.9;
  }
  .stars { font-size:2em; text-align:center; margin-bottom:14px; letter-spacing:4px; }

  .wrong-list {
    background:rgba(201,162,39,0.05);
    border:1px solid rgba(201,162,39,0.2);
    border-radius:8px; padding:12px 16px;
    margin-bottom:18px; max-height:150px; overflow-y:auto;
    font-size:0.85em; color:#a07030; line-height:1.9; text-align:left;
  }

  .btn-restart {
    background:linear-gradient(135deg,#8b0000,#cc0000);
    color:#ffd700; padding:13px 48px;
    font-size:1.05em; border-radius:4px;
    border:1px solid rgba(201,162,39,0.4);
    font-family:'Noto Serif KR',serif;
    letter-spacing:2px;
    box-shadow:0 4px 16px rgba(180,0,0,0.4);
  }
  .btn-restart:hover { transform:translateY(-2px); }
</style>
</head>
<body>

<script>
  const leafEmojis = ['🍂','🍁','⚔️','🗡️'];
  for(let i=0;i<10;i++){
    const el=document.createElement('div');
    el.className='leaf';
    el.textContent=leafEmojis[Math.floor(Math.random()*leafEmojis.length)];
    el.style.cssText=`left:${Math.random()*100}%;font-size:${Math.random()*1+0.8}em;animation-duration:${Math.random()*14+10}s;animation-delay:${Math.random()*12}s;`;
    document.body.appendChild(el);
  }
</script>

<div class="scroll">
  <div class="bg-hanja">三</div>

  <!-- 시작 화면 -->
  <div class="screen active" id="startScreen">
    <div class="start-icon">⚔️</div>
    <div class="start-title">삼 국 지 퀴 즈</div>
    <div class="start-sub">도원결의 → 여포의 최후</div>
    <div class="start-box">
      ⚔️ 총 <b>20문제</b> | 삼국지 초반 이야기<br>
      🌸 복숭아밭의 의형제 맺음부터<br>
      🏯 하비성 여포의 최후까지!<br>
      🐎 유비 · 관우 · 장비 · 조조 · 여포를 얼마나 아나요?
    </div>
    <button class="btn btn-start" onclick="startQuiz()">⚔️ 출진!</button>
  </div>

  <!-- 퀴즈 화면 -->
  <div class="screen" id="quizScreen">
    <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
    <div class="prog-label" id="progLabel"></div>
    <div class="q-tag" id="qTag"></div>
    <div class="q-num" id="qNum"></div>
    <div class="q-text" id="qText"></div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- 최종 화면 -->
  <div class="screen" id="finalScreen">
    <div class="final-icon" id="finalIcon"></div>
    <div class="final-title">⚔️ 전투 종료!</div>
    <div class="stars" id="finalStars"></div>
    <div class="score-box">
      <div class="score-num" id="scoreNum"></div>
      <div class="score-sub" id="scoreSub"></div>
    </div>
    <div class="final-msg" id="finalMsg"></div>
    <div class="wrong-list" id="wrongList"></div>
    <button class="btn btn-restart" onclick="restartQuiz()">재도전 🔄</button>
  </div>
</div>

<!-- 팝업 -->
<div class="overlay" id="overlay">
  <div class="popup">
    <img class="popup-photo" id="popPhoto" src="" alt="혜원이">
    <div class="popup-title" id="popTitle"></div>
    <div class="correct-label" id="popCorrect"></div>
    <div class="explain-box" id="popExplain"></div>
    <button class="btn btn-next" onclick="nextQ()">다음 →</button>
  </div>
</div>

let cur=0, score=0, wrong=[];

function startQuiz(){
  document.getElementById("startScreen").classList.remove("active");
  document.getElementById("quizScreen").classList.add("active");
  showQ();
}

function showQ(){
  const q=Qs[cur], n=Qs.length;
  document.getElementById("progBar").style.width=(cur/n*100)+"%";
  document.getElementById("progLabel").textContent=(cur+1)+" / "+n+" 문제";
  document.getElementById("qTag").textContent=q.tag||"";
  document.getElementById("qNum").textContent="문제 "+(cur+1);
  document.getElementById("qText").innerHTML=q.q;
  const cd=document.getElementById("choices"); cd.innerHTML="";
  q.choices.forEach((c,i)=>{
    const btn=document.createElement("button");
    btn.className="choice-btn";
    btn.innerHTML=["①","②","③","④"][i]+" "+c;
    btn.onclick=()=>pick(i);
    cd.appendChild(btn);
  });
}

function pick(idx){
  const q=Qs[cur];
  document.querySelectorAll(".choice-btn").forEach(b=>b.disabled=true);
  const ok=idx===q.ans;
  document.querySelectorAll(".choice-btn")[idx].classList.add(ok?"correct":"wrong");
  if(!ok) document.querySelectorAll(".choice-btn")[q.ans].classList.add("correct");
  if(ok) score++;
  else wrong.push((cur+1)+"번: "+q.q.substring(0,24)+"…");
  document.getElementById("popPhoto").src=ok?OK_IMG:NG_IMG;
  document.getElementById("popTitle").textContent=ok?"🎉 정답이오!":"😅 아쉽소이다!";
  document.getElementById("popTitle").className="popup-title "+(ok?"ok":"ng");
  document.getElementById("popCorrect").innerHTML=ok?"":
    "정답: "+["①","②","③","④"][q.ans]+" "+(q.choices[q.ans]||"");
  document.getElementById("popExplain").textContent=q.explain||"";
  document.getElementById("overlay").classList.add("show");
}

function nextQ(){
  document.getElementById("overlay").classList.remove("show");
  cur++;
  if(cur<Qs.length) showQ(); else showFinal();
}

function showFinal(){
  document.getElementById("quizScreen").classList.remove("active");
  document.getElementById("finalScreen").classList.add("active");
  const n=Qs.length, pct=Math.round(score/n*100);
  // 결과 전송
  (function(){
    var now=new Date();
    var ds=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    var ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    fetch(APPS_URL+'?subject='+encodeURIComponent(SUBJECT)+'&score='+score+'&total='+n+'&percent='+pct+'&date='+ds+'&time='+ts).catch(function(){});
  })();
  document.getElementById("scoreNum").textContent=score+" / "+n;
  document.getElementById("scoreSub").textContent="정답률 "+pct+"%";
  let stars="",msg="",icon="";
  if(pct>=90){stars="⭐⭐⭐⭐⭐";msg="천하제일 군사! 삼국지를 꿰뚫고 있어요!\n제갈공명도 혜원이를 인정할 거예요! 🪄";icon="🏆";}
  else if(pct>=70){stars="⭐⭐⭐⭐";msg="훌륭한 장수! 삼국지를 잘 알고 있어요!\n조금 더 읽으면 천하무적이 될 거예요! ⚔️";icon="⚔️";}
  else if(pct>=50){stars="⭐⭐⭐";msg="가능성 있는 신진 무장!\n삼국지를 더 읽어보면 재미있을 거예요! 📖";icon="🛡️";}
  else{stars="⭐⭐";msg="삼국지의 세계에 발을 들였어요!\n천천히 읽다 보면 금방 빠져들 거예요! 🌸";icon="🌸";}
  document.getElementById("finalIcon").textContent=icon;
  document.getElementById("finalStars").textContent=stars;
  document.getElementById("finalMsg").textContent=msg;
  const wl=document.getElementById("wrongList");
  wl.innerHTML=wrong.length===0
    ?"<b>🎊 전부 정답! 삼국지 고수!!</b>"
    :"<b>📝 다시 볼 문제:</b><br>"+wrong.join("<br>");
}

function restartQuiz(){
  cur=0; score=0; wrong=[];
  document.getElementById("finalScreen").classList.remove("active");
  document.getElementById("startScreen").classList.add("active");
}
