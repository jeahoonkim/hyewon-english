<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>혜원이 그리스 신화 퀴즈</title>
<style>
:root{
  --bg1:#1a1230;--bg2:#2d1b4e;--acc:#ffd700;--acc2:#ffb300;--acc3:#ff8f00;
  --card:rgba(255,255,255,.07);--cardborder:rgba(255,215,0,.25);
  --text:#f5e6c8;--sub:#c9a96e;--ok:#69f0ae;--ng:#ff5252;
  --shadow:0 4px 32px rgba(0,0,0,.45);
  --font-q:1.12rem;--font-opt:1.02rem;--font-exp:.93rem;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);min-height:100vh;color:var(--text)}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#ffd700;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.page{display:none;position:relative;z-index:1;min-height:100vh;padding:20px 16px}
.page.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.intro-card{background:rgba(255,215,0,.08);border:2px solid var(--acc);border-radius:28px;padding:40px 32px;max-width:460px;width:100%;text-align:center;box-shadow:0 0 40px rgba(255,215,0,.2)}
.intro-emoji{font-size:4rem;margin-bottom:12px}
.intro-title{font-size:1.9rem;font-weight:900;color:var(--acc);margin-bottom:8px;text-shadow:0 0 20px rgba(255,215,0,.5)}
.intro-sub{font-size:1rem;color:var(--sub);margin-bottom:28px;line-height:1.7}
.intro-info{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.info-badge{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#1a1230;padding:6px 16px;border-radius:20px;font-size:.85rem;font-weight:800}
.btn-start{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#1a1230;border:none;border-radius:24px;padding:15px 48px;font-size:1.1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(255,215,0,.4);transition:.2s}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,215,0,.55)}
#page-quiz{background:transparent;justify-content:flex-start;padding-top:16px}
.quiz-header{width:100%;max-width:600px;margin-bottom:14px}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.q-num{font-size:.9rem;font-weight:700;color:var(--acc);white-space:nowrap}
.prog-bar{flex:1;height:10px;background:rgba(255,215,0,.15);border-radius:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:8px;transition:width .4s}
.score-badge{font-size:.85rem;font-weight:700;color:var(--acc2);white-space:nowrap}
.quiz-card{background:var(--card);border:2px solid var(--cardborder);border-radius:24px;padding:26px 22px;max-width:600px;width:100%;box-shadow:var(--shadow);backdrop-filter:blur(8px)}
.theme-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:12px;color:#1a1230}
.question{font-size:var(--font-q);font-weight:700;line-height:1.7;margin-bottom:20px;word-break:keep-all;color:var(--text)}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:rgba(255,255,255,.05);border:2px solid rgba(255,215,0,.2);border-radius:14px;padding:13px 16px;font-size:var(--font-opt);cursor:pointer;transition:.18s;display:flex;align-items:center;gap:10px;font-weight:500;color:var(--text);word-break:keep-all;text-align:left}
.opt:hover:not(:disabled){background:rgba(255,215,0,.12);border-color:var(--acc);transform:translateX(4px)}
.opt-label{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#1a1230;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:900;flex-shrink:0}
.opt.correct{background:rgba(105,240,174,.12);border-color:var(--ok)!important}
.opt.wrong{background:rgba(255,82,82,.12);border-color:var(--ng)!important}
.opt:disabled{cursor:default}
.feedback{margin-top:18px;padding:16px;border-radius:16px;display:none;animation:fadeIn .35s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback.show{display:block}
.feedback.ok{background:rgba(105,240,174,.1);border:2px solid rgba(105,240,174,.4)}
.feedback.ng{background:rgba(255,82,82,.1);border:2px solid rgba(255,82,82,.35)}
.fb-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.fb-photo{width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid var(--acc);box-shadow:0 0 12px rgba(255,215,0,.4);flex-shrink:0}
.fb-verdict{font-size:1.2rem;font-weight:900}
.fb-verdict.ok{color:var(--ok)}
.fb-verdict.ng{color:var(--ng)}
.fb-exp{font-size:var(--font-exp);line-height:1.7;color:#d4b896;word-break:keep-all}
.btn-next{margin-top:14px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#1a1230;border:none;border-radius:20px;padding:12px 36px;font-size:1rem;font-weight:900;cursor:pointer;display:block;margin-left:auto;transition:.2s}
.btn-next:hover{transform:translateY(-2px)}
#page-result{background:transparent}
.result-card{background:rgba(255,215,0,.07);border:2px solid var(--acc);border-radius:28px;padding:36px 28px;max-width:480px;width:100%;text-align:center;box-shadow:0 0 40px rgba(255,215,0,.2)}
.result-emoji{font-size:3.5rem;margin-bottom:10px}
.result-title{font-size:1.7rem;font-weight:900;color:var(--acc);margin-bottom:6px}
.result-score{font-size:3rem;font-weight:900;color:var(--acc);margin:16px 0 8px;text-shadow:0 0 20px rgba(255,215,0,.4)}
.result-sub{font-size:1rem;color:var(--sub);margin-bottom:20px}
.result-bar-wrap{background:rgba(255,215,0,.12);border-radius:12px;height:18px;margin:0 auto 20px;max-width:320px;overflow:hidden}
.result-bar{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:12px;transition:width 1s}
.result-msg{font-size:1rem;font-weight:600;line-height:1.75;color:var(--text);margin-bottom:24px;word-break:keep-all}
.btn-retry{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#1a1230;border:none;border-radius:20px;padding:13px 40px;font-size:1rem;font-weight:900;cursor:pointer;transition:.2s}
.btn-retry:hover{transform:translateY(-2px)}
#dl-msg{display:none;margin-top:12px;font-size:.9rem;color:var(--ok);font-weight:700}
#dl-msg.show{display:block}
</style>
</head>
<body>
<div id="stars"></div>
<div class="page active" id="page-intro">
  <div class="intro-card">
    <div class="intro-emoji">⚡</div>
    <div class="intro-title">그리스 신화 퀴즈</div>
    <div class="intro-sub">올림포스의 신들과 영웅들을 알아봐요!<br>신화 속 이야기가 펼쳐집니다 🏛️</div>
    <div class="intro-info">
      <span class="info-badge">📚 초등 4학년</span>
      <span class="info-badge">❓ 20문제</span>
      <span class="info-badge">⚡ 그리스 신화</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">퀴즈 시작! 🏺</button>
  </div>
</div>
<div class="page" id="page-quiz">
  <div class="quiz-header">
    <div class="progress-row">
      <span class="q-num" id="q-num">1 / 20</span>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:5%"></div></div>
      <span class="score-badge" id="score-badge">⭐ 0점</span>
    </div>
  </div>
  <div class="quiz-card">
    <span class="theme-tag" id="theme-tag">신화</span>
    <div class="question" id="question-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback">
      <div class="fb-top">
        <img class="fb-photo" id="fb-photo" src="" alt="">
        <span class="fb-verdict" id="fb-verdict"></span>
      </div>
      <div class="fb-exp" id="fb-exp"></div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">다음 문제 →</button>
    </div>
  </div>
</div>
<div class="page" id="page-result">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <div class="result-title">퀴즈 완료!</div>
    <div class="result-score" id="result-score">0 / 20</div>
    <div class="result-sub" id="result-sub">정답률 0%</div>
    <div class="result-bar-wrap"><div class="result-bar" id="result-bar" style="width:0%"></div></div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn-retry" onclick="retryQuiz()">다시 도전! ⚡</button>
    <br><br>
    <button class="btn-start" style="font-size:.9rem;padding:10px 28px;margin-top:8px" onclick="genHTML()">📥 이 퀴즈 저장하기</button>
    <div id="dl-msg">✅ 저장 완료!</div>
  </div>
</div>

let cur=0,score=0;
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
(function(){
  for(let i=0;i<80;i++){
    const s=document.createElement('div');s.className='star';
    const size=Math.random()*3+1;
    s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${-Math.random()*5}s`;
    document.getElementById('stars').appendChild(s);
  }
})();
function startQuiz(){cur=0;score=0;showQ();showPage('page-quiz');}
function retryQuiz(){startQuiz();}
function showQ(){
  const Q=QUESTIONS[cur];
  document.getElementById('q-num').textContent=(cur+1)+' / '+QUESTIONS.length;
  document.getElementById('prog-fill').style.width=((cur+1)/QUESTIONS.length*100)+'%';
  document.getElementById('score-badge').textContent='⭐ '+score+'점';
  const tag=document.getElementById('theme-tag');tag.textContent=Q.tag;tag.style.background=Q.color;
  document.getElementById('question-text').textContent=Q.q;
  const optDiv=document.getElementById('options');optDiv.innerHTML='';
  ['①','②','③','④'].forEach((l,i)=>{
    const btn=document.createElement('button');btn.className='opt';
    btn.innerHTML=`<span class="opt-label">${l}</span>${Q.opts[i]}`;
    btn.onclick=()=>checkAns(i);optDiv.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback';
}
function checkAns(idx){
  const Q=QUESTIONS[cur];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.querySelectorAll('.opt')[Q.ans].classList.add('correct');
  if(idx!==Q.ans)document.querySelectorAll('.opt')[idx].classList.add('wrong');
  if(idx===Q.ans)score++;
  const ok=idx===Q.ans;
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'ok':'ng')+' show';
  document.getElementById('fb-photo').src=ok?PHOTO_OK:PHOTO_NG;
  const v=document.getElementById('fb-verdict');
  v.className='fb-verdict '+(ok?'ok':'ng');
  v.textContent=ok?'🎉 정답이에요!':'😢 오답이에요!';
  document.getElementById('fb-exp').textContent='💡 '+Q.exp;
  document.getElementById('score-badge').textContent='⭐ '+score+'점';
  document.getElementById('btn-next').textContent=cur<QUESTIONS.length-1?'다음 문제 →':'결과 보기 🏆';
}
function nextQ(){cur++;if(cur>=QUESTIONS.length){showResult();return;}showQ();}
function showResult(){
  const total=QUESTIONS.length,pct=Math.round(score/total*100);
  document.getElementById('result-score').textContent=score+' / '+total;
  document.getElementById('result-sub').textContent='정답률 '+pct+'%';
  setTimeout(()=>document.getElementById('result-bar').style.width=pct+'%',100);
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='완벽해요! 신화 박사 혜원이! 올림포스 신들을 모두 꿰뚫고 있네요. 제우스도 감탄할 실력이에요! ⚡';}
  else if(pct>=70){emoji='🌟';msg='정말 잘했어요! 그리스 신화를 많이 알고 있네요. 조금 더 읽으면 신화 전문가가 될 거예요! 🏛️';}
  else if(pct>=50){emoji='🏺';msg='절반 이상 맞혔어요! 신화는 이야기가 많아서 어려울 수 있어요. 다시 도전해봐요! 💪';}
  else{emoji='⚡';msg='괜찮아요! 그리스 신화는 처음엔 낯설 수 있어요. 이야기를 읽다 보면 금방 익숙해질 거예요! 🌟';}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-msg').textContent=msg;
  sendResult('그리스 신화 퀴즈',score,total);
  showPage('page-result');
}
function sendResult(subject,score,total){
  try{
    const percent=Math.round(score/total*100);
    const params=new URLSearchParams({subject,score:String(score),total:String(total),percent:String(percent)});
    const img=new Image();img.src=APPS_SCRIPT_URL+'?'+params.toString();
  }catch(e){console.log('전송 오류:',e);}
}
function getDateStr(){const d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}
function genHTML(){
  const html=document.documentElement.outerHTML;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='혜원이_그리스신화_퀴즈_'+getDateStr()+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  document.getElementById('dl-msg').classList.add('show');
}
</script>
